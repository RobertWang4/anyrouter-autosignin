name: Daily Check-in

on:
  schedule:
    # 每天北京时间 08:00（UTC 00:00）运行
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate config from secrets
        run: |
          echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Run check-in
        run: node checkin.js

      - name: Send Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TIME_ZONE: America/Toronto
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            node telegram-report.js checkin-summary.json
          else
            echo "Telegram secrets not configured, skipping"
          fi

      - name: Upload logs and screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-logs
          path: |
            checkin.log
            checkin-summary.json
            error-*.png
          retention-days: 7
