name: Daily Check-in

on:
  schedule:
    # 每天 UTC 14:00（北京时间 22:00），作为兜底
    # 本地 launchd 在 08:00 执行，脚本有当日去重逻辑
    # 如果本地当天已跑过，这里会自动跳过
    - cron: "0 14 * * *"
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate config from secrets
        run: |
          echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Run check-in
        run: node checkin.js

      - name: Upload logs and screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-logs
          path: |
            checkin.log
            error-*.png
          retention-days: 7
